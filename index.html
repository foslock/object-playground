<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Physics Canvas</title>
    <style>
      *, *::before, *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #f8f8f8;
      }

      #canvas {
        display: block;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
        cursor: crosshair;
      }

      #tilt-btn {
        display: none;
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        padding: 10px 22px;
        font-size: 14px;
        font-family: system-ui, sans-serif;
        color: #fff;
        background: rgba(80, 80, 120, 0.75);
        border: 1px solid rgba(180, 180, 255, 0.4);
        border-radius: 999px;
        cursor: pointer;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        box-shadow: 0 0 12px rgba(120, 120, 255, 0.3);
        letter-spacing: 0.03em;
        z-index: 10;
      }

      #tilt-btn:active {
        background: rgba(100, 100, 160, 0.85);
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <button id="tilt-btn">Enable Tilt Controls</button>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
